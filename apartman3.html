<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apartman</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* TOP */
.top {
  background: #111;
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
}
.top a {
  color: white;
  text-decoration: none;
}

/* SLIDER */
.slider {
  position: relative;
  height: 75vh;
  overflow: hidden;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SLIDES */
.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.8s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.slide.active {
  opacity: 1;
}

/* KLJUČNO: bez zooma */
.slide img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  background: rgba(0,0,0,0.4);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  z-index: 10;
}

.left { left: 10px; }
.right { right: 10px; }

/* THUMBS */
.thumbs {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: white;
  overflow-x: auto;
  flex-wrap: nowrap;
}

.thumbs img {
  width: 110px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
  flex: 0 0 auto;
}

/* CONTENT */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}

.icons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 10px;
}

.icon {
  background: #eee;
  padding: 8px 12px;
  border-radius: 8px;
}

/* BOOKING */
.booking {
  background: #1877F2;
  text-align: center;
  padding: 18px;
  border-radius: 12px;
  margin-top: 25px;
}

.booking a {
  color: white;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
  display: block;
}

/* FOOTER */
.footer {
  background: #111;
  color: white;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 40px;
  text-align: center;
  margin-top: 60px;
}

.social-icons a {
  color: white;
  font-size: 26px;
  margin: 0 10px;
  text-decoration: none;
}

.social-icons a:hover {
  color: #e74c3c;
}
</style>
</head>

<body>

<div class="top">
  <div>Apartman</div>
  <a href="index.html">← Nazad</a>
</div>

<!-- SLIDER -->
<div class="slider">

  <div class="slide active">
    <img src="slike/GoreDesno/10.JPG">
  </div>

  <div class="slide">
    <img src="slike/GoreDesno/29.JPG">
  </div>

  <div class="slide">
    <img src="slike/GoreDesno/29.jpeg">
  </div>

  <button class="arrow left" onclick="change(-1)">&#10094;</button>
  <button class="arrow right" onclick="change(1)">&#10095;</button>

</div>

<!-- THUMBS -->
<div class="thumbs">
  <img src="slike/GoreDesno/10.JPG">
  <img src="slike/GoreDesno/5.JPG">
  <img src="slike/GoreDesno/6.JPG">
  <img src="slike/GoreDesno/7.JPG">
  <img src="slike/GoreDesno/8.JPG">
  <img src="slike/GoreDesno/9.JPG">
</div>

<!-- CONTENT -->
<div class="container">

  <div class="box">
    <h2>Ime apartmana</h2>
    <p>Moderan i udoban apartman na odličnoj lokaciji.</p>

    <div class="icons">
      <div class="icon">📶 WiFi</div>
      <div class="icon">❄ Klima</div>
      <div class="icon">🛏 Krevet</div>
      <div class="icon">🚿 Kupatilo</div>
      <div class="icon">🍳 Kuhinja</div>
    </div>

    <div class="booking">
      <a href="#">Rezerviši odmah</a>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">

  <div>
    <h3>Kontakt</h3>
    <p>Telefon: +385 91 144 4471</p>
    <p>Email: medenisrima@gmail.com</p>
  </div>

  <div>
    <h3>Društvene mreže</h3>
    <div class="social-icons">
      <a href="#"><i class="fab fa-viber"></i></a>
      <a href="#"><i class="fab fa-facebook"></i></a>
      <a href="#"><i class="fab fa-whatsapp"></i></a>
    </div>
  </div>

</div>

<script>
const slides = document.querySelectorAll(".slide");
let current = 0;

let interval = setInterval(next, 3000);

function show(i){
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

function next(){
  current = (current + 1) % slides.length;
  show(current);
}

function change(dir){
  clearInterval(interval);

  current += dir;
  if(current < 0) current = slides.length - 1;
  if(current >= slides.length) current = 0;

  show(current);

  interval = setInterval(next, 3000);
}
</script>

</body>
</html>
