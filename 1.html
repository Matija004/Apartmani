<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apartmani</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* SLIDESHOW */
    .slideshow {
      position: relative;
      width: 100%;
      height: 60vh;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .slide.active {
      opacity: 1;
    }

    /* APARTMANI GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none;
      color: black;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .card-content h3 {
      margin: 0 0 10px;
    }
  </style>
</head>
<body>

  <!-- SLIDESHOW -->
  <div class="slideshow">
    <div class="slide active" style="background-image: url('img1.jpg');"></div>
    <div class="slide" style="background-image: url('img2.jpg');"></div>
    <div class="slide" style="background-image: url('img3.jpg');"></div>
  </div>

  <!-- APARTMANI -->
  <div class="grid">

    <a href="apartman1.html" class="card">
      <img src="a1.jpg" alt="Apartman 1">
      <div class="card-content">
        <h3>Apartman 1</h3>
        <p>Kratak opis apartmana.</p>
      </div>
    </a>

    <a href="apartman2.html" class="card">
      <img src="a2.jpg" alt="Apartman 2">
      <div class="card-content">
        <h3>Apartman 2</h3>
        <p>Kratak opis apartmana.</p>
      </div>
    </a>

    <a href="apartman3.html" class="card">
      <img src="a3.jpg" alt="Apartman 3">
      <div class="card-content">
        <h3>Apartman 3</h3>
        <p>Kratak opis apartmana.</p>
      </div>
    </a>

    <a href="apartman4.html" class="card">
      <img src="a4.jpg" alt="Apartman 4">
      <div class="card-content">
        <h3>Apartman 4</h3>
        <p>Kratak opis apartmana.</p>
      </div>
    </a>

    <a href="apartman5.html" class="card">
      <img src="a5.jpg" alt="Apartman 5">
      <div class="card-content">
        <h3>Apartman 5</h3>
        <p>Kratak opis apartmana.</p>
      </div>
    </a>

    <a href="apartman6.html" class="card">
      <img src="a6.jpg" alt="Apartman 6">
      <div class="card-content">
        <h3>Apartman 6</h3>
        <p>Kratak opis apartmana.</p>
      </div>
    </a>

  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;

    setInterval(() => {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, 3000);
  </script>

</body>
</html>
